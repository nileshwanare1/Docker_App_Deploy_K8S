apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web-deployment
  labels:
    app: nginx-web
spec:
  replicas: 2   # number  of pods
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
      - name: nginx-web
        image: 286008326537.dkr.ecr.ap-south-1.amazonaws.com/dockerimage:latest
        ports:
        - containerPort: 80
